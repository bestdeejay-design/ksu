<style>
html,body{height:100%;overflow:hidden}
body{display:flex;flex-direction:column}
.nav{position:fixed;z-index:100}
.book-wrap{
  flex:1;width:100%;max-width:1200px;
  display:flex;align-items:center;justify-content:center;
  padding:80px 40px;margin:80px auto 0
}
#book{width:100%;height:100%;--fb-bg:var(--bg);--fb-paper:#fff;--fb-control-bg:rgba(0,0,0,.72);--fb-control-fg:#fff;--fb-counter-fg:var(--text-muted)}

<nav class="nav">
  <div class="nav__inner">
    <a href="../index.html#project-9" class="nav__logo" style="font-size:18px">Ksenia</a>
    <div class="nav__links">
      <a href="../index.html#project-9" class="nav__link" style="display:inline-flex;align-items:center;gap:6px">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Назад
      </a>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <svg class="theme-toggle__icon theme-toggle__sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="theme-toggle__icon theme-toggle__moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>

      </button>
    </div>
  </div>

<div class="book-wrap">
  <div id="book" data-pdflipbook="../portfolio/photobook/photobook-final.pdf"></div>
</div>

<script>
(function(){
  var html = document.documentElement
  var saved = localStorage.getItem('theme') || 'dark'
  html.setAttribute('data-theme', saved)
  document.getElementById('theme-toggle').addEventListener('click', function(){
    var next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light'
    html.setAttribute('data-theme', next)
    localStorage.setItem('theme', next)
  })
})();
</script>
<script src="pdflipbook.js"></script>
</body>
