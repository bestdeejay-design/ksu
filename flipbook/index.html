<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  background:#0A0A0A;color:#F5F5F5;
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  display:flex;flex-direction:column;align-items:center;
  --accent:#FF2D55;
}
.book-wrap{
  flex:1;width:100%;max-width:1200px;
  display:flex;align-items:center;justify-content:center;
  padding:80px 40px;
}
#book{
  width:100%;height:100%;
  --fb-bg:transparent;
  --fb-paper:#fff;
  --fb-control-bg:rgba(10,10,10,.82);
  --fb-control-fg:#fff;
  --fb-counter-fg:rgba(255,255,255,.5);
}
.back{
  position:fixed;top:24px;left:24px;z-index:100;
  display:inline-flex;align-items:center;gap:8px;
  background:var(--accent);color:#fff;border:none;
  padding:10px 22px;border-radius:100px;
  font-family:'Inter',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;text-decoration:none;
  transition:transform .2s,box-shadow .2s;
  touch-action:manipulation;
}
.back:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(255,45,85,.3)}
.back svg{width:16px;height:16px;flex-shrink:0}
@media(max-width:768px){
  .book-wrap{padding:60px 16px}
  .back{top:12px;left:12px;padding:8px 16px;font-size:13px}
}
</style>
