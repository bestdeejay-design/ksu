.flipbook-page .nav__links{

.book-wrap{

  display:flex;align-items:center;justify-content:center;
  padding:80px 40px;margin:80px auto 0

  --fb-paper:#fff;
  --fb-control-bg:rgba(0,0,0,.72);
  --fb-control-fg:#fff;
  --fb-counter-fg:rgba(255,255,255,.85)
}
@media(max-width:768px){

  .book-wrap{padding:70px 12px 16px}
